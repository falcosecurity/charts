{{- if .Values.defaultNetworkPolicy.enabled -}}
{{- if .Values.webui.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "falcosidekick.fullname" . }}-ui-redis-network-policy
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ui-redis
      app.kubernetes.io/instance: falco
      app.kubernetes.io/name: falcosidekick
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept Traffic on REDIS port 6379 from falcosidekick-ui
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: falco
          podSelector:
            matchLabels:
              app.kubernetes.io/component: ui
              app.kubernetes.io/instance: falco
              app.kubernetes.io/name: falcosidekick
          podSelector:
      ports:
        - port: 6379
          protocol: TCP
  egress:
    # Allow kube-dns resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
{{- end -}}
{{- end -}}