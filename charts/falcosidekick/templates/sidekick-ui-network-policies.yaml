{{- if .Values.networkPolicies.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "falcosidekick.fullname" . }}-ui-network-policy-ingress-from-falco-core
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ui
      app.kubernetes.io/instance: falco
      app.kubernetes.io/name: falcosidekick
  policyTypes:
    - Ingress
  ingress:
    # Accept Traffic on port 2802 from falco
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: core
              app.kubernetes.io/instance: falco
              app.kubernetes.io/name: falcosidekick
      ports:
        - port: 2802
          protocol: TCP
{{- if .Values.webui.ingress.enabled -}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "falcosidekick.fullname" . }}-ui-network-policy-ingress-from-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ui
      app.kubernetes.io/instance: falco
      app.kubernetes.io/name: falcosidekick
  policyTypes:
    - Ingress
  ingress:
    # Accept Traffic on port 2802 from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              {{- with .Values.networkPolicies.webuiIngressNetworkPoliciesNamespaceSelector }}
              {{- toYaml . | nindent 18 }}
              {{- end }}
          podSelector:
            matchLabels:
              {{- with .Values.networkPolicies.webuiIngressNetworkPoliciesPodSelector }}
              {{- toYaml . | nindent 18 }}
              {{- end }}
      ports:
        - port: 2802
          protocol: TCP
{{- end -}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "falcosidekick.fullname" . }}-ui-network-policy-egress-to-redis
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ui
      app.kubernetes.io/instance: falco
      app.kubernetes.io/name: falcosidekick
  policyTypes:
    - Egress
  egress:
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/component: ui-redis
            app.kubernetes.io/instance: falco
            app.kubernetes.io/name: falcosidekick
      ports:
        - port: 6379
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "falcosidekick.fullname" . }}-ui-network-policy-egress-to-coredns
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ui
      app.kubernetes.io/instance: falco
      app.kubernetes.io/name: falcosidekick
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
 {{- end -}}
